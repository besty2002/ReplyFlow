services:
  # FastAPI Web Service (백그라운드 봇 포함)
  - type: web
    name: replyflow-web
    env: docker
    plan: free
    region: singapore
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: YAMATO_SITE_ID
        sync: false
      - key: YAMATO_SITE_PASSWORD
        sync: false
